name: Build RemoteControl

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet packages
      run: |
        nuget restore RemoteControl.sln
        msbuild RemoteControl.sln /t:restore /p:Configuration=Release "/p:Platform=Any CPU"

    - name: Build Solution
      run: msbuild RemoteControl.sln /p:Configuration=Release "/p:Platform=Any CPU" /v:minimal

    - name: Upload Server (控制端)
      uses: actions/upload-artifact@v4
      with:
        name: RemoteControl-Server
        path: |
          RemoteControl.Server/bin/Release/RemoteControl.Server.exe
          RemoteControl.Server/bin/Release/*.dll
          RemoteControl.Server/bin/Release/config.json
          RemoteControl.Server/bin/Release/Skins/**

    - name: Upload Client (用户端)
      uses: actions/upload-artifact@v4
      with:
        name: RemoteControl-Client
        path: |
          RemoteControl.Client.Lite/bin/Release/RemoteControl.Client.exe
          RemoteControl.Client.Lite/bin/Release/*.dll
